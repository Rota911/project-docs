name: Nextra Self Hosted CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: nextra-prod
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build

      - name: Run postbuild if present
        shell: powershell
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          if ($pkg.scripts -and $pkg.scripts.PSObject.Properties.Name -contains "postbuild") {
            bun run postbuild
          }

      - name: Restart pm2 app
        shell: powershell
        run: |
          try { pm2 delete nextra-app } catch { }
          pm2 start bun --name "nextra-app" -- run serve

