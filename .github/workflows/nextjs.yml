name: Nextra Self Hosted CI

on:
  push:
    branches: ["main"]

concurrency:
  group: nextra-prod
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted

    env:
      PM2_HOME: C:\pm2   # Stable PM2 home

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add Bun bin to PATH
        shell: powershell
        run: |
          $env:PATH = "$env:USERPROFILE\.bun\bin;$env:PATH"
          Write-Host "PATH updated: $env:PATH"

      - name: Ensure PM2_HOME exists
        shell: powershell
        run: |
          if (-not (Test-Path $env:PM2_HOME)) {
            New-Item -ItemType Directory -Force $env:PM2_HOME | Out-Null
          }

      - name: Stop pm2 app (safe)
        shell: powershell
        run: |
          pm2 stop nextra-app 2>$null
          pm2 delete nextra-app 2>$null
          exit 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Run postbuild if present
        shell: powershell
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          if ($pkg.scripts -and $pkg.scripts.PSObject.Properties.Name -contains "postbuild") {
            bun run postbuild
          }

      - name: Start pm2 app
        shell: powershell
        run: |
          pm2 start bun --name "nextra-app" -- run serve
          pm2 save
