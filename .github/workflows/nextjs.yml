name: Nextra Self Hosted CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: nextra-prod
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build

      - run: |
          if bun run | grep -q postbuild; then
            bun run postbuild
          fi

      - run: |
          pm2 delete nextra-app || true
          pm2 start bun --name "nextra-app" -- run start
