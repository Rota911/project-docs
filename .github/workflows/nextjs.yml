name: Build Nextra App

# Trigger workflow manually or on push to main branch
on:
  push:
    branches:
      - main
  workflow_dispatch: # allows manual trigger from Actions tab

jobs:
  build:
    runs-on: self-hosted
    env:
      PM2_HOME: C:\pm2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure PM2_HOME exists
        shell: powershell
        run: |
          if (-not (Test-Path $env:PM2_HOME)) {
            New-Item -ItemType Directory -Force -Path $env:PM2_HOME | Out-Null
          }

      - name: Stop pm2 app (safe)
        shell: powershell
        run: |
          & "$env:USERPROFILE\.bun\bin\pm2.exe" stop nextra-app -s
          & "$env:USERPROFILE\.bun\bin\pm2.exe" delete nextra-app -s
          exit 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Run postbuild if present
        shell: powershell
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          if ($pkg.scripts -and $pkg.scripts.PSObject.Properties.Name -contains "postbuild") {
            bun run postbuild
          }

      - name: Start pm2 app
        shell: powershell
        run: |
          & "$env:USERPROFILE\.bun\bin\pm2.exe" start bun --name "nextra-app" -- run serve
          & "$env:USERPROFILE\.bun\bin\pm2.exe" save
